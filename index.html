<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Monitor</title>
<style>
  :root {
    --ink: #f8f1d6;
    --muted: #b8c0cf;
    --dark: #11172a;
    --wall: #0a1020;
    --wall-2: #182238;
    --wood-a: #7b4a27;
    --wood-b: #6b3d20;
    --wood-line: rgba(39, 21, 12, .32);
    --carpet: #2f6f9d;
    --carpet-dark: #255577;
    --label: rgba(18, 16, 28, .86);
    --label-border: #5b5e7a;
    --yellow: #ffd44d;
    --blue: #5ea8ff;
    --green: #6ee185;
    --red: #ff5872;
    --cream: #efe3c8;
    --shadow: 0 18px 50px rgba(0, 0, 0, .32);
    --pixel: 4px;
  }

  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    margin: 0;
    color: var(--ink);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Hiragino Sans", "Yu Gothic", monospace;
    background:
      linear-gradient(180deg, rgba(10, 14, 28, .82), rgba(11, 18, 34, .96)),
      repeating-linear-gradient(0deg, #111827 0 2px, #0f172a 2px 4px);
    overflow-x: hidden;
  }

  button, input { font: inherit; }
  .app { min-height: 100vh; }

  .top-ribbon {
    position: sticky;
    top: 0;
    z-index: 20;
    background: #0c1325;
    border-bottom: 4px solid #000;
    box-shadow: 0 4px 0 #22304a;
  }
  .top-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    color: #13213a;
    background: var(--yellow);
    border: 3px solid #000;
    box-shadow: 3px 3px 0 rgba(0, 0, 0, .55);
    display: grid;
    place-items: center;
    font-weight: 900;
  }
  .brand-name {
    font-size: 15px;
    font-weight: 900;
    white-space: nowrap;
  }
  .mode-row {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .mode-chip,
  .filter-btn {
    height: 30px;
    border: 2px solid #000;
    background: #1b2944;
    color: var(--ink);
    box-shadow: 2px 2px 0 rgba(0, 0, 0, .5);
    padding: 0 9px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 900;
    white-space: nowrap;
  }
  .mode-chip.live {
    color: #15120a;
    background: var(--yellow);
  }
  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--red);
    border: 2px solid #000;
    animation: blinkPixel .7s steps(2, end) infinite;
  }
  @keyframes blinkPixel { 50% { opacity: .25; } }
  .ticker {
    min-width: 220px;
    max-width: 520px;
    height: 30px;
    padding: 0 10px;
    display: flex;
    align-items: center;
    color: #0e1320;
    background: #f3ead0;
    border: 2px solid #000;
    box-shadow: 2px 2px 0 rgba(0, 0, 0, .5);
    overflow: hidden;
    font-size: 12px;
    font-weight: 900;
  }
  .ticker span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .updated {
    color: #e8e2c5;
    font-size: 11px;
    white-space: nowrap;
  }

  .main {
    width: min(1280px, 100%);
    margin: 0 auto;
    padding: 18px 14px 40px;
  }
  .controls {
    display: grid;
    grid-template-columns: minmax(200px, 1fr) auto;
    gap: 12px;
    margin-bottom: 14px;
    align-items: center;
  }
  .search {
    height: 40px;
    width: 100%;
    color: var(--ink);
    background: #151d31;
    border: 3px solid #000;
    box-shadow: 3px 3px 0 rgba(0, 0, 0, .48);
    padding: 0 12px;
    outline: none;
  }
  .search::placeholder { color: #798294; }
  .filter-pills {
    display: flex;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-btn {
    cursor: pointer;
  }
  .filter-btn.active {
    background: var(--yellow);
    color: #15120a;
  }

  .hud {
    display: grid;
    grid-template-columns: repeat(6, minmax(92px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .metric {
    min-height: 70px;
    color: #101523;
    background: #eadfca;
    border: 3px solid #000;
    box-shadow: 4px 4px 0 rgba(0, 0, 0, .55);
    padding: 9px 11px;
  }
  .metric-label {
    color: #55606f;
    font-size: 11px;
    font-weight: 900;
  }
  .metric-value {
    margin-top: 5px;
    font-size: 28px;
    line-height: 1;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }
  .metric.running .metric-value { color: #e23f54; }
  .metric.ok .metric-value { color: #2c9d55; }
  .metric.error .metric-value { color: #d13a3a; }
  .metric.source .metric-value { color: #2a72ad; }

  .section-head {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 12px;
    margin: 18px 0 10px;
  }
  .section-head h1,
  .section-head h2 {
    margin: 0;
    color: #fff0b8;
    text-shadow: 3px 3px 0 #000;
    font-size: 20px;
    line-height: 1.2;
  }
  .section-note {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .studio-wrap {
    position: relative;
    border: 4px solid #000;
    background: #0b1020;
    box-shadow: var(--shadow), 6px 6px 0 rgba(0, 0, 0, .54);
    overflow: hidden;
  }
  .studio-map {
    position: relative;
    min-height: 620px;
    isolation: isolate;
    background: #111827;
  }
  .studio-map::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      linear-gradient(90deg, transparent 49.5%, #050812 49.5% 50.5%, transparent 50.5%),
      linear-gradient(180deg, transparent 69%, #050812 69% 70.2%, transparent 70.2%);
    pointer-events: none;
  }
  .room {
    position: absolute;
    z-index: 1;
    border: 4px solid #050812;
    box-shadow: inset 0 0 0 3px rgba(255, 255, 255, .04);
    overflow: hidden;
  }
  .room.ops {
    left: 18px;
    top: 18px;
    width: 48%;
    height: 58%;
    background:
      repeating-linear-gradient(0deg, transparent 0 27px, var(--wood-line) 27px 30px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.02) 0 70px, rgba(0,0,0,.10) 70px 73px),
      linear-gradient(180deg, var(--wood-a), var(--wood-b));
  }
  .room.lounge {
    right: 18px;
    top: 18px;
    width: 46%;
    height: 50%;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0 28px, rgba(0,0,0,.10) 28px 31px),
      linear-gradient(180deg, var(--carpet), var(--carpet-dark));
  }
  .room.hall {
    right: 18px;
    bottom: 18px;
    width: 46%;
    height: 25%;
    background:
      linear-gradient(45deg, #f1f1f1 25%, transparent 25% 75%, #f1f1f1 75%),
      linear-gradient(45deg, #f1f1f1 25%, #161616 25% 75%, #f1f1f1 75%);
    background-position: 0 0, 22px 22px;
    background-size: 44px 44px;
  }
  .room.lab {
    left: 18px;
    bottom: 18px;
    width: 48%;
    height: 22%;
    background:
      repeating-linear-gradient(90deg, #21314b 0 38px, #1b2840 38px 40px),
      #21314b;
  }
  .wall-top {
    position: absolute;
    left: 18px;
    right: 18px;
    top: 18px;
    height: 78px;
    z-index: 2;
    pointer-events: none;
    background: #172844;
    border-bottom: 4px solid #050812;
  }
  .shelf,
  .plant,
  .clock,
  .picture,
  .desk,
  .chair,
  .sofa,
  .table,
  .monitor,
  .trash {
    position: absolute;
    z-index: 3;
  }
  .shelf {
    top: 16px;
    width: 118px;
    height: 36px;
    background:
      repeating-linear-gradient(90deg, #f3e2b7 0 8px, #9a3030 8px 14px, #263855 14px 20px),
      #8b5b2c;
    border: 3px solid #1c1020;
    box-shadow: inset 0 -7px 0 #5f361d;
  }
  .shelf.left { left: 64px; }
  .shelf.mid { left: 330px; }
  .plant {
    width: 38px;
    height: 58px;
  }
  .plant::before {
    content: "";
    position: absolute;
    left: 10px;
    top: 2px;
    width: 20px;
    height: 34px;
    background: #2fa85a;
    box-shadow: -12px 10px 0 #27874b, 12px 8px 0 #3ec96b, 0 -8px 0 #4ad976;
    border: 2px solid #0d3a25;
  }
  .plant::after {
    content: "";
    position: absolute;
    left: 8px;
    bottom: 0;
    width: 25px;
    height: 18px;
    background: #8e5d32;
    border: 3px solid #2a160e;
  }
  .plant.a { left: 30px; top: 42px; }
  .plant.b { right: 38px; top: 42px; }
  .plant.c { left: 46px; bottom: 38px; }
  .clock {
    top: 32px;
    left: 250px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #f6f1e0;
    border: 4px solid #1a1a22;
  }
  .clock::before,
  .clock::after {
    content: "";
    position: absolute;
    left: 15px;
    top: 7px;
    width: 3px;
    height: 11px;
    background: #db4558;
    transform-origin: bottom;
  }
  .clock::after { transform: rotate(90deg); top: 14px; height: 9px; }
  .picture {
    top: 24px;
    width: 48px;
    height: 36px;
    background: #d7b46d;
    border: 4px solid #572b20;
    box-shadow: inset 0 0 0 5px #284e78;
  }
  .picture.one { right: 320px; }
  .picture.two { right: 190px; width: 82px; }
  .picture.three { right: 78px; }
  .desk {
    width: 138px;
    height: 62px;
    background: #c49358;
    border: 4px solid #3a2217;
    box-shadow: inset 0 -8px 0 rgba(0, 0, 0, .16);
  }
  .desk.d1 { left: 105px; top: 170px; }
  .desk.d2 { left: 330px; top: 170px; }
  .desk.d3 { left: 86px; top: 398px; width: 180px; height: 74px; }
  .desk.d4 { left: 300px; top: 398px; width: 180px; height: 74px; }
  .monitor {
    width: 42px;
    height: 34px;
    background: #e8edf1;
    border: 4px solid #263044;
    box-shadow: inset 0 0 0 8px #1b1f32;
  }
  .monitor::after {
    content: "";
    position: absolute;
    left: 14px;
    bottom: -12px;
    width: 12px;
    height: 10px;
    background: #1e2637;
  }
  .m1 { left: 150px; top: 144px; }
  .m2 { left: 398px; top: 144px; }
  .m3 { left: 130px; top: 365px; }
  .m4 { left: 358px; top: 365px; }
  .m5 { left: 420px; top: 365px; }
  .chair {
    width: 32px;
    height: 32px;
    background: #62a85b;
    border: 4px solid #26351f;
    border-radius: 8px 8px 12px 12px;
  }
  .chair.c1 { left: 166px; top: 238px; }
  .chair.c2 { left: 404px; top: 238px; }
  .sofa {
    width: 120px;
    height: 44px;
    background: #d84d63;
    border: 4px solid #5b1d2d;
    box-shadow: inset 0 -10px 0 rgba(0,0,0,.14);
  }
  .sofa.s1 { right: 175px; top: 210px; }
  .sofa.s2 { right: 72px; top: 298px; width: 46px; height: 104px; }
  .sofa.s3 { right: 318px; top: 298px; width: 46px; height: 104px; }
  .sofa.s4 { right: 175px; top: 424px; }
  .table {
    width: 92px;
    height: 82px;
    background: #c79558;
    border: 4px solid #59311e;
    box-shadow: inset 0 -8px 0 rgba(0,0,0,.13);
  }
  .table.t1 { right: 190px; top: 316px; }
  .trash {
    width: 26px;
    height: 28px;
    background: #e5e5de;
    border: 4px solid #283040;
    border-radius: 0 0 9px 9px;
  }
  .trash.t2 { right: 230px; top: 348px; }
  .trash.t3 { left: 64px; bottom: 50px; }

  .agent-token {
    position: absolute;
    z-index: 10;
    width: 118px;
    min-height: 98px;
    transform: translate(-50%, -50%);
  }
  .agent-token.running .sprite { animation: workerBob .72s steps(2, end) infinite; }
  @keyframes workerBob { 50% { transform: translateY(-4px); } }
  .sprite {
    position: absolute;
    left: 46px;
    top: 38px;
    width: 30px;
    height: 42px;
    filter: drop-shadow(3px 4px 0 rgba(0,0,0,.35));
  }
  .sprite::before {
    content: "";
    position: absolute;
    left: 6px;
    top: 0;
    width: 18px;
    height: 18px;
    background: var(--skin, #d89a6a);
    border: 3px solid #201629;
    box-shadow: 0 -6px 0 var(--hair, #2a1b21);
  }
  .sprite::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 21px;
    width: 22px;
    height: 18px;
    background: var(--shirt, #235d92);
    border: 3px solid #201629;
    box-shadow: -7px 8px 0 #201629, 7px 8px 0 #201629;
  }
  .speech {
    position: absolute;
    left: 18px;
    top: 0;
    min-width: 164px;
    max-width: 230px;
    color: #fff;
    background: var(--label);
    border: 3px solid var(--label-border);
    box-shadow: 4px 4px 0 rgba(0, 0, 0, .55);
    padding: 8px 10px 9px 14px;
  }
  .speech::before {
    content: "";
    position: absolute;
    left: 7px;
    top: 18px;
    width: 7px;
    height: 7px;
    background: var(--blue);
    border: 2px solid #101522;
    animation: blinkPixel .9s steps(2, end) infinite;
  }
  .agent-token.idle .speech::before { background: var(--green); animation: none; }
  .agent-token.error .speech::before { background: var(--red); }
  .agent-token:nth-child(odd) .speech { transform: translateX(-96px); }
  .agent-name {
    display: block;
    margin-left: 13px;
    color: var(--yellow);
    font-size: 14px;
    line-height: 1.15;
    font-weight: 900;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 2px 2px 0 #000;
  }
  .agent-task {
    display: block;
    margin: 3px 0 0 13px;
    color: #f7f2df;
    font-size: 12px;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .agent-source {
    display: inline-flex;
    margin-top: 5px;
    margin-left: 13px;
    color: #101523;
    background: #a7d7ff;
    border: 2px solid #101523;
    padding: 1px 5px;
    font-size: 10px;
    font-weight: 900;
  }
  .agent-source.claude-code { background: #ffcf87; }

  .bottom-area {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(300px, .68fr);
    gap: 14px;
    margin-top: 18px;
  }
  .panel {
    background: #121a2e;
    border: 3px solid #000;
    box-shadow: 4px 4px 0 rgba(0, 0, 0, .5);
    padding: 13px;
  }
  .panel h2 {
    margin: 0 0 10px;
    color: #fff0b8;
    font-size: 15px;
    text-shadow: 2px 2px 0 #000;
  }
  .activity-list,
  .type-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .activity-item,
  .type-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 9px;
    align-items: center;
    min-height: 34px;
    color: var(--muted);
    background: #1a253d;
    border: 2px solid #050812;
    padding: 6px 8px;
    font-size: 12px;
  }
  .activity-dot {
    width: 10px;
    height: 10px;
    background: var(--green);
    border: 2px solid #000;
  }
  .activity-dot.running { background: var(--red); animation: blinkPixel .8s steps(2, end) infinite; }
  .activity-dot.error { background: var(--red); }
  .activity-label,
  .type-name {
    min-width: 0;
    color: #f6edd0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .activity-time,
  .type-count {
    color: #aeb8c9;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .type-bar {
    grid-column: 1 / -1;
    height: 8px;
    background: #0a1020;
    border: 2px solid #050812;
    overflow: hidden;
  }
  .type-bar span {
    display: block;
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #5ea8ff, #ffd44d);
  }
  .empty-state {
    min-height: 120px;
    display: grid;
    place-items: center;
    color: #b8c0cf;
    background: #151d31;
    border: 3px dashed #3b4862;
    text-align: center;
    padding: 20px;
    font-size: 13px;
  }
  .hidden { display: none !important; }

  @media (max-width: 980px) {
    .top-inner { grid-template-columns: 1fr; }
    .mode-row { flex-wrap: wrap; }
    .ticker { min-width: 100%; }
    .hud { grid-template-columns: repeat(3, minmax(92px, 1fr)); }
    .studio-map { min-height: 760px; }
    .room.ops,
    .room.lounge,
    .room.lab,
    .room.hall { left: 14px; right: 14px; width: auto; }
    .room.ops { top: 14px; height: 330px; }
    .room.lounge { top: 358px; height: 220px; }
    .room.lab { bottom: 14px; height: 150px; }
    .room.hall { display: none; }
    .bottom-area { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .main { padding: 12px 10px 28px; }
    .controls { grid-template-columns: 1fr; }
    .filter-pills { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 3px; }
    .hud { grid-template-columns: repeat(2, minmax(92px, 1fr)); }
    .section-head { align-items: flex-start; flex-direction: column; gap: 4px; }
    .studio-map { min-height: 720px; }
    .speech { max-width: 180px; min-width: 150px; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="top-ribbon">
      <div class="top-inner">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div class="brand-name">Agent Monitor</div>
        </div>
        <div class="mode-row">
          <div class="mode-chip live"><span class="live-dot"></span>ライブ</div>
          <div class="mode-chip">撮影モード</div>
          <div class="mode-chip">Codex / Claude</div>
          <div class="ticker"><span id="ticker-text">AIチームの稼働状況を読み込み中</span></div>
        </div>
        <div class="updated" id="updated">--:-- 更新</div>
      </div>
    </header>

    <main class="main">
      <div class="controls">
        <input id="search" class="search" type="search" placeholder="担当名・種類で検索" />
        <div class="filter-pills" id="filters">
          <button class="filter-btn active" data-filter="all">全員</button>
          <button class="filter-btn" data-filter="running">稼働中</button>
          <button class="filter-btn" data-filter="idle">待機</button>
          <button class="filter-btn" data-filter="error">要確認</button>
          <button class="filter-btn" data-filter="codex">Codex</button>
          <button class="filter-btn" data-filter="claude-code">Claude</button>
        </div>
      </div>

      <section class="hud" aria-label="summary">
        <div class="metric"><div class="metric-label">合計</div><div class="metric-value" id="metric-total">0</div></div>
        <div class="metric running"><div class="metric-label">稼働中</div><div class="metric-value" id="metric-running">0</div></div>
        <div class="metric ok"><div class="metric-label">待機</div><div class="metric-value" id="metric-idle">0</div></div>
        <div class="metric error"><div class="metric-label">要確認</div><div class="metric-value" id="metric-error">0</div></div>
        <div class="metric source"><div class="metric-label">Codex</div><div class="metric-value" id="metric-codex">0</div></div>
        <div class="metric source"><div class="metric-label">Claude</div><div class="metric-value" id="metric-claude">0</div></div>
      </section>

      <section>
        <div class="section-head">
          <h1>AIチーム稼働フロア</h1>
          <div class="section-note" id="featured-note">実データを抽象表示</div>
        </div>
        <div class="studio-wrap">
          <div class="studio-map" id="studio-map">
            <div class="room ops"></div>
            <div class="room lounge"></div>
            <div class="room hall"></div>
            <div class="room lab"></div>
            <div class="wall-top"></div>
            <div class="shelf left"></div><div class="shelf mid"></div>
            <div class="clock"></div>
            <div class="picture one"></div><div class="picture two"></div><div class="picture three"></div>
            <div class="plant a"></div><div class="plant b"></div><div class="plant c"></div>
            <div class="desk d1"></div><div class="desk d2"></div><div class="desk d3"></div><div class="desk d4"></div>
            <div class="monitor m1"></div><div class="monitor m2"></div><div class="monitor m3"></div><div class="monitor m4"></div><div class="monitor m5"></div>
            <div class="chair c1"></div><div class="chair c2"></div>
            <div class="sofa s1"></div><div class="sofa s2"></div><div class="sofa s3"></div><div class="sofa s4"></div>
            <div class="table t1"></div><div class="trash t2"></div><div class="trash t3"></div>
            <div id="agent-layer"></div>
          </div>
        </div>
      </section>

      <section class="bottom-area">
        <div class="panel">
          <h2>最近の動き</h2>
          <div class="activity-list" id="activity-list"></div>
        </div>
        <div class="panel">
          <h2>仕事の種類</h2>
          <div class="type-list" id="type-list"></div>
        </div>
      </section>
    </main>
  </div>

<script>
  if (window.location.protocol === "file:") {
    window.location.replace("http://localhost:8799/");
  }

  const REFRESH_MS = 3000;
  const state = {
    agents: [],
    summary: {},
    filter: "all",
    search: "",
    lastGeneratedAt: null
  };

  const byId = (id) => document.getElementById(id);
  const els = {
    search: byId("search"),
    filters: byId("filters"),
    agentLayer: byId("agent-layer"),
    activityList: byId("activity-list"),
    typeList: byId("type-list"),
    ticker: byId("ticker-text"),
    updated: byId("updated"),
    featuredNote: byId("featured-note"),
    total: byId("metric-total"),
    running: byId("metric-running"),
    idle: byId("metric-idle"),
    error: byId("metric-error"),
    codex: byId("metric-codex"),
    claude: byId("metric-claude")
  };

  const SPOTS = [
    [41, 30], [21, 49], [37, 56], [30, 75],
    [72, 44], [84, 48], [72, 68], [84, 72]
  ];
  const SKINS = ["#d89a6a", "#f0c08b", "#a96d4e", "#e4ad7c", "#c98462"];
  const HAIRS = ["#251720", "#453128", "#7b3e2d", "#d6ba76", "#1c2738"];
  const SHIRTS = ["#235d92", "#9d303f", "#2f8f65", "#52449d", "#d28a2b", "#1b6f83"];

  function stripTechnicalLocations(value) {
    return String(value || "")
      .replace(/file:\/\/\/[^\s)]+/g, "")
      .replace(/https?:\/\/[^\s)]+/g, "")
      .replace(/~\/[^\s)]+/g, "")
      .replace(/\/Users\/[^\s)]+/g, "")
      .replace(/(?:^|\s)(?:cwd|path|folder|dir|directory|workspace|project)[:=]\s*[^\s)]+/gi, " ")
      .replace(/(?:^|\s)(?:フォルダ|ディレクトリ|保存場所|作業場所)[:：]\s*[^\s)]+/g, " ")
      .replace(/\b[a-z0-9_.-]+\/(?:[a-z0-9_.-]+\/)+[a-z0-9_.-]+\b/gi, "")
      .replace(/\s*[-–—|｜:：]\s*$/g, "")
      .replace(/^\s*[-–—|｜:：]\s*/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function isInternalLabel(value) {
    const text = String(value || "").trim();
    return !text
      || /^Use\s+\$[a-z0-9_.-]+\.?$/i.test(text)
      || /^\$[a-z0-9_.-]+$/i.test(text)
      || /^gpt[-\w.]*$/i.test(text)
      || /^codex-auto-review$/i.test(text)
      || /^The following is the Codex agent history/i.test(text)
      || /^Codex ran out of room/i.test(text)
      || /^https?:\/\/?/i.test(text);
  }

  function friendlyInternalLabel(value, fallback = "確認中") {
    const text = String(value || "").trim();
    if (/^codex-auto-review$/i.test(text)) return "レビュー担当";
    if (/^Codex ran out of room/i.test(text)) return "引き継ぎ中";
    if (/^The following is the Codex agent history/i.test(text)) return "レビュー中";
    if (/^https?:\/\//i.test(text)) return "Web確認中";
    return fallback;
  }

  function cleanText(value, fallback = "") {
    const raw = String(value || "").replace(/^Automation:\s*/i, "");
    if (/^https?:\/\//i.test(raw.trim())) return friendlyInternalLabel(raw, "Web確認中");
    const stripped = stripTechnicalLocations(raw);
    if (stripped && !isInternalLabel(stripped)) return stripped;
    const friendly = friendlyInternalLabel(raw, "");
    if (friendly) return friendly;
    const fallbackText = stripTechnicalLocations(fallback);
    if (fallbackText && !isInternalLabel(fallbackText)) return fallbackText;
    return friendlyInternalLabel(fallback, "確認中");
  }

  function cleanDisplayName(value) {
    const text = cleanText(value, "");
    if (!text || text === "確認中" || text === "Web確認中") return "";
    return text;
  }

  function hashText(text) {
    let h = 2166136261;
    for (let i = 0; i < text.length; i += 1) {
      h ^= text.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return Math.abs(h >>> 0);
  }

  function jobBaseName(agent) {
    const text = `${agent.job_type || ""} ${agent.headline || ""} ${agent.skill || ""}`;
    if (/SNS|コンテンツ|Instagram|Threads|note|リール|投稿/.test(text)) return "SNS導線編集長";
    if (/営業|新規事業|競合|案件|市場/.test(text)) return "営業リサーチ担当";
    if (/経理|請求|精算|invoice/.test(text)) return "経理チェック担当";
    if (/採用|求人|面接|応募/.test(text)) return "採用確認担当";
    if (/資料|スライド|プレゼン/.test(text)) return "資料まとめ担当";
    if (/文字起こし|議事録/.test(text)) return "議事録整理担当";
    if (/デザイン|UI|UX|画面/.test(text)) return "デザイン確認担当";
    if (/開発|エンジニアリング|コード|実装|バグ|DB/.test(text)) return "実装チェック担当";
    if (/秘書|自動化|定型/.test(text)) return "PM秘書担当";
    return "リサーチ担当";
  }

  function displayName(agent, index, allAgents) {
    const explicit = cleanDisplayName(agent.nickname);
    if (explicit) return explicit;
    const base = jobBaseName(agent);
    const sameBase = allAgents.filter((item) => !cleanDisplayName(item.nickname) && jobBaseName(item) === base);
    if (sameBase.length <= 1) return base;
    const nth = sameBase.findIndex((item) => (item.id || item.headline) === (agent.id || agent.headline)) + 1;
    return `${base}${toCircledNumber(nth)}`;
  }

  function toCircledNumber(n) {
    const chars = ["", "①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⑪", "⑫", "⑬", "⑭", "⑮", "⑯", "⑰", "⑱", "⑲", "⑳"];
    return chars[n] || String(n);
  }

  function sourceLabel(source) {
    if (source === "claude-code") return "Claude";
    return "Codex";
  }

  function statusLabel(agent) {
    const job = cleanText(agent.job_type, "その他");
    if (agent.status === "running") return `${job}中`;
    if (agent.status === "error") return `${job}確認`;
    return `${job}待機`;
  }

  function activityLabel(agent) {
    if (agent.status === "running") return "作業中";
    if (agent.status === "error") return "要確認";
    return "待機中";
  }

  function relativeTime(ms) {
    if (!ms) return "--";
    const diff = Math.max(0, Date.now() - ms);
    const min = Math.floor(diff / 60000);
    if (min < 1) return "今";
    if (min < 60) return `${min}分前`;
    const hours = Math.floor(min / 60);
    if (hours < 24) return `${hours}時間前`;
    return `${Math.floor(hours / 24)}日前`;
  }

  function formatClock(ms) {
    const date = new Date(ms || Date.now());
    return date.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function matchFilter(agent) {
    if (state.filter === "all") return true;
    if (["running", "idle", "error"].includes(state.filter)) return agent.status === state.filter;
    return agent.source === state.filter;
  }

  function matchSearch(agent) {
    if (!state.search) return true;
    const hay = [agent._displayName, agent.role, agent.job_type, agent.skill, agent.current_tool, agent.source]
      .join(" ").toLowerCase();
    return hay.includes(state.search.toLowerCase());
  }

  function visibleAgents() {
    return state.agents.filter((agent) => matchFilter(agent) && matchSearch(agent));
  }

  function updateMetrics() {
    const agents = state.agents;
    const summary = state.summary || {};
    els.total.textContent = summary.total ?? agents.length;
    els.running.textContent = summary.running ?? agents.filter((a) => a.status === "running").length;
    els.idle.textContent = summary.idle ?? agents.filter((a) => a.status === "idle").length;
    els.error.textContent = summary.error ?? agents.filter((a) => a.status === "error").length;
    els.codex.textContent = agents.filter((a) => a.source === "codex").length;
    els.claude.textContent = agents.filter((a) => a.source === "claude-code").length;
  }

  function renderAgent(agent, index) {
    const spot = SPOTS[index % SPOTS.length];
    const jitter = hashText(agent.id || agent._displayName) % 7;
    const left = Math.min(93, Math.max(8, spot[0] + (jitter - 3)));
    const top = Math.min(88, Math.max(14, spot[1] + ((jitter % 3) - 1) * 3));
    const h = hashText(agent.id || agent._displayName);
    const style = [
      `left:${left}%`,
      `top:${top}%`,
      `--skin:${SKINS[h % SKINS.length]}`,
      `--hair:${HAIRS[(h >> 3) % HAIRS.length]}`,
      `--shirt:${SHIRTS[(h >> 6) % SHIRTS.length]}`
    ].join(";");
    return `
      <div class="agent-token ${agent.status || "idle"}" style="${style}">
        <div class="speech">
          <span class="agent-name">${escapeHtml(agent._displayName)}</span>
          <span class="agent-task">${escapeHtml(statusLabel(agent))}</span>
          <span class="agent-source ${agent.source || "codex"}">${sourceLabel(agent.source)}</span>
        </div>
        <div class="sprite" aria-hidden="true"></div>
      </div>
    `;
  }

  function renderMap() {
    const agents = visibleAgents();
    const running = agents.filter((agent) => agent.status === "running");
    els.featuredNote.textContent = running.length ? `${running.length}名が稼働中` : "稼働待ちのAIチーム";
    if (!agents.length) {
      els.agentLayer.innerHTML = `<div class="empty-state">表示できるエージェントがありません。</div>`;
      return;
    }
    const ordered = agents.slice().sort((a, b) => {
      const score = { running: 0, error: 1, idle: 2 };
      return (score[a.status] ?? 9) - (score[b.status] ?? 9) || (b.updated_at_ms || 0) - (a.updated_at_ms || 0);
    }).slice(0, 8);
    els.agentLayer.innerHTML = ordered.map((agent, index) => renderAgent(agent, index)).join("");
  }

  function renderActivity() {
    const agents = state.agents.slice().sort((a, b) => (b.updated_at_ms || 0) - (a.updated_at_ms || 0)).slice(0, 8);
    if (!agents.length) {
      els.activityList.innerHTML = `<div class="empty-state">最近の動きはまだありません。</div>`;
      return;
    }
    els.activityList.innerHTML = agents.map((agent) => `
      <div class="activity-item">
        <span class="activity-dot ${agent.status || "idle"}"></span>
        <div class="activity-label">${escapeHtml(`${agent._displayName} ${activityLabel(agent)}`)}</div>
        <div class="activity-time">${escapeHtml(relativeTime(agent.updated_at_ms))}</div>
      </div>
    `).join("");
  }

  function renderTypes() {
    const counts = new Map();
    state.agents.forEach((agent) => {
      const key = cleanText(agent.job_type, "その他");
      counts.set(key, (counts.get(key) || 0) + 1);
    });
    const rows = Array.from(counts.entries()).sort((a, b) => b[1] - a[1]);
    const max = Math.max(1, ...rows.map((row) => row[1]));
    if (!rows.length) {
      els.typeList.innerHTML = `<div class="empty-state">分類できるエージェントがありません。</div>`;
      return;
    }
    els.typeList.innerHTML = rows.map(([name, count]) => `
      <div class="type-row">
        <span class="activity-dot"></span>
        <div class="type-name">${escapeHtml(name)}</div>
        <div class="type-count">${count}</div>
        <div class="type-bar"><span style="width:${Math.round(count / max * 100)}%"></span></div>
      </div>
    `).join("");
  }

  function updateTicker() {
    const running = state.agents.filter((agent) => agent.status === "running");
    const target = running[0] || state.agents[0];
    if (!target) {
      els.ticker.textContent = "AIチームの稼働状況を読み込み中";
      return;
    }
    els.ticker.textContent = `${target._displayName} ${activityLabel(target)} / ${cleanText(target.job_type, "その他")}`;
  }

  function renderAll() {
    updateMetrics();
    renderMap();
    renderActivity();
    renderTypes();
    updateTicker();
  }

  function normalizeAgent(agent, index, allAgents) {
    const next = { ...agent };
    next.status = next.status || "idle";
    next.source = next.source || "codex";
    next.headline = cleanText(next.headline, cleanText(next.title, "確認中"));
    next.job_type = cleanText(next.job_type, "その他");
    next._displayName = displayName(next, index, allAgents);
    return next;
  }

  async function fetchState() {
    try {
      const res = await fetch("/api/state", { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const rawAgents = Array.isArray(data.agents) ? data.agents : [];
      state.agents = rawAgents.map((agent, index) => normalizeAgent(agent, index, rawAgents));
      state.summary = data.summary || {};
      state.lastGeneratedAt = data.generated_at_ms || Date.now();
      els.updated.textContent = `${formatClock(state.lastGeneratedAt)} 更新`;
      renderAll();
    } catch (err) {
      els.updated.textContent = "取得エラー";
      els.ticker.textContent = "ローカルサーバーに接続できません";
      els.agentLayer.innerHTML = `<div class="empty-state">データ取得に失敗しました。server.py の起動状態を確認してください。</div>`;
      els.activityList.innerHTML = "";
      els.typeList.innerHTML = "";
    }
  }

  els.search.addEventListener("input", (event) => {
    state.search = event.target.value.trim();
    renderMap();
  });

  els.filters.addEventListener("click", (event) => {
    const button = event.target.closest("button[data-filter]");
    if (!button) return;
    state.filter = button.dataset.filter;
    els.filters.querySelectorAll(".filter-btn").forEach((btn) => btn.classList.toggle("active", btn === button));
    renderMap();
  });

  fetchState();
  setInterval(fetchState, REFRESH_MS);
</script>
</body>
</html>
